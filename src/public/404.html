<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      text-align: center;
      background:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url('https://img.youtube.com/vi/3V7Rvo4Gvic/maxresdefault.jpg') center/cover no-repeat;
      color: #fff;
    }

    h1 { font-size: 6rem; font-weight: bold; }
    p  { font-size: 1.2rem; margin: 1rem 0 2rem; }

    a {
      display: inline-block;
      padding: 0.6rem 1.8rem;
      background: #fff;
      color: #000;
      text-decoration: none;
      font-size: 1rem;
      border-radius: 4px;
    }

    a:hover { background: #ddd; }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>Searching for a file that doesn't exist</p>
  <a href="/">Go Home</a>
</body>
</html>
